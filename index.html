<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>DeckTamer Battle Manager</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<h1>DeckTamer Battle Manager</h1>

<div id="app">

    <!-- ========================= -->
    <!-- PLAYER 1 -->
    <!-- ========================= -->

    <div id="player1Deck">

        <h2>Player 1 Deck</h2>

        <div class="searchBox">

            <input
                id="player1Search"
                type="text"
                placeholder="Creature name">

            <button
                onclick="updateSearchResults(1)">
                Search
            </button>

        </div>

        <div
            id="player1SearchResults"
            class="searchResults">
        </div>

        <hr>

        <div id="player1DeckCards"></div>

    </div>


    <!-- ========================= -->
    <!-- BOARD -->
    <!-- ========================= -->

    <div id="board"></div>


    <!-- ========================= -->
    <!-- PLAYER 2 -->
    <!-- ========================= -->

    <div id="player2Deck">

        <h2>Player 2 Deck</h2>

        <div class="searchBox">

            <input
                id="player2Search"
                type="text"
                placeholder="Creature name">

            <button
                onclick="updateSearchResults(2)">
                Search
            </button>

        </div>

        <div
            id="player2SearchResults"
            class="searchResults">
        </div>

        <hr>

        <div id="player2DeckCards"></div>

    </div>

</div>


<div id="controls">

    <button onclick="endTurn()">

        End Turn

    </button>

</div>


<div id="inspector">

    <h2>Inspector</h2>

    <div id="inspectorContent">

        No card selected.

    </div>

</div>


<script src="js/database.js"></script>
<script src="js/match.js"></script>
<script src="js/ui.js"></script>
<script src="js/main.js"></script>

</body>

</html>
